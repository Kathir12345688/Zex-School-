services:
  - type: web
    name: zexsch-backend
    env: python
    plan: free
    buildCommand: "cd backend && pip install -r requirements.txt && python manage.py migrate && python manage.py collectstatic --noinput && python manage.py create_admin"
    startCommand: "cd backend && gunicorn backend.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.11
      - key: DEBUG
        value: False
      - key: SECRET_KEY
        generateValue: true
      - key: DB_USE_POSTGRES
        value: True
      - key: CORS_ALLOWED_ORIGINS
        value: http://localhost:5173,https://zex-school.vercel.app
      - key: CSRF_TRUSTED_ORIGINS
        value: https://zex-school.vercel.app
